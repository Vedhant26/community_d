services:
  - type: web
    name: trapeye-api
    env: python
    rootDir: backend_community
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///threats.db
